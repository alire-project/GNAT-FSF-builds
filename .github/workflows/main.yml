  gprbuild_windows-2022:
    name: GPRbuild (windows-2022)
    runs-on: windows-2022
    env:
      CONFIG_SHELL: /bin/bash
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - name: Checkout Project
      uses: actions/checkout@v4
    - name: Install msys2
      uses: msys2/setup-msys2@v2
      with:
        install: |-
          base-devel
          git
          rsync
          mingw-w64-x86_64-github-cli
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-python
          mingw-w64-x86_64-python-pip
          mingw-w64-x86_64-python-psutil
    - name: Install Python dependencies
      run: |-
        python3 -m pip install --upgrade pip
        pip install --break-system-packages e3-core==22.10.0
    - name: Prepare msys2 build setup
      run: |-
        df -h
        mkdir C:/aaa
        mount C:/aaa /aaa
        cd ..
        cp -r GNAT-FSF-builds /aaa
    - name: Build GPRbuild
      run: mount C:/aaa /aaa && cd /aaa/GNAT-FSF-builds && python3 ./anod build gprbuild -v --loglevel DEBUG --enable-cleanup
