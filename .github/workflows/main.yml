        python3 -m pip install --upgrade pip
        pip install --break-system-packages e3-core==22.10.0
    - name: Download artifact 'gprbuild-release-packages'
      uses: actions/download-artifact@v4
      with:
        name: gprbuild-release-packages_ubuntu-22-04
        path: in_artifacts/
    - name: Build GNATformat
      run: python3 ./anod build gnatformat -v --loglevel DEBUG --enable-cleanup
    - name: Package GNATformat
      run: python3 ./anod build release_package --qualifier=package=gnatformat -v --loglevel DEBUG
    - if: inputs.do_gh_release
